# Google Cloud Build configuration for automated deployment
steps:
  # Install dependencies
  - name: 'python:3.12'
    entrypoint: 'pip'
    args: ['install', '-r', 'requirements.txt']
    dir: 'backend'

  # Run database migrations
  - name: 'python:3.12'
    entrypoint: 'python'
    args: ['-c', 'from database import engine; import models; models.Base.metadata.create_all(bind=engine)']
    dir: 'backend'
    env:
      - 'DATABASE_URL=${_DATABASE_URL}'
      - 'GOOGLE_CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME}'
      - 'DB_USER=${_DB_USER}'
      - 'DB_PASSWORD=${_DB_PASSWORD}'
      - 'DB_NAME=${_DB_NAME}'

  # Deploy to App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['app', 'deploy', 'app.yaml', '--quiet']
    dir: 'backend'

# Substitution variables (set these in Cloud Build triggers)
substitutions:
  _DATABASE_URL: 'postgresql://user:password@/dbname?host=/cloudsql/project:region:instance'
  _CLOUD_SQL_CONNECTION_NAME: 'your-project:your-region:your-instance'
  _DB_USER: 'postgres'
  _DB_PASSWORD: 'your-secure-password'
  _DB_NAME: 'business_intelligence'

# Build timeout
timeout: '1200s'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'